name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Format
        run: cargo fmt --all --check

  portability:
    # DESIGN.md §13: build the core for an Android target every run so a
    # Linux-only dependency can't sneak into the engine or engine-ffi. russh
    # uses the `ring` crypto backend, whose C/asm needs the NDK toolchain
    # (the same one Phase 9's cargo-ndk build uses), so the guard installs
    # the NDK and drives the check through cargo-ndk.
    name: Android-target portability guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain + android target
        run: rustup show
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - uses: Swatinem/rust-cache@v2
      - name: Check engine + engine-ffi for arm64-v8a
        run: cargo ndk -t arm64-v8a check -p engine -p engine-ffi

  ffi:
    # Prove the FFI boundary on Linux (§10.1 layer 5) and keep iOS honest by
    # generating Swift bindings every run (§12 Phase 8).
    name: FFI bindings + Python driver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Generate bindings (python + kotlin + swift)
        run: scripts/build-desktop-ffi.sh
      - name: Drive the engine across the FFI boundary (Python)
        run: scripts/run-ffi-test.sh
